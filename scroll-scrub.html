<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <!-- No theme-color — leaving it off lets iOS Safari's translucent URL bar
       and status bar dynamically blur the underlying content, so the chrome
       always blends with whatever scene is on screen. -->
  <title>quentin.</title>
  <style>
    @font-face {
      font-family: 'LowerResolution';
      src: url('LowerResolution-period.ttf') format('truetype');
      font-display: swap;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      width: 100%;
      /* Black so iOS Safari's translucent chrome doesn't get tinted by a
         document-level color. Lets the chrome's blur sample the actual video
         content above instead of leaning toward a static body color. */
      background: #000;
      color: #fff;
      font-family: 'LowerResolution', system-ui, sans-serif;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: none;
    }

    .stage {
      position: fixed;
      inset: 0;
      overflow: hidden;
      /* Black like body — gives iOS chrome the cleanest sample of the
         video content above it. */
      background: #000;
    }

    .layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.55s ease-out;
      pointer-events: none;
    }
    .layer.active { opacity: 1; }
    /* Stack so the newer state fades in on top of the previous one as backdrop —
       no black flash because something is always fully opaque underneath. */
    #idle-video  { z-index: 1; }
    #scrub-video { z-index: 2; }
    #end-video   { z-index: 3; }

    /* Name wordmark — appears on load, fades out once you start scrolling */
    .brand {
      position: absolute;
      top: 34%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'LowerResolution', system-ui, sans-serif;
      font-size: clamp(3.5rem, 14vw, 11rem);
      line-height: 1;
      /* VHS treatment — same recipe as .start-btn, offsets scaled up for the
         much larger font size. Keeps the font itself unchanged. */
      color: #fff5c4;
      text-shadow:
        /* thin uneven black outline */
         3px  3px 0 rgba(0, 0, 0, 0.95),
        -3px  3px 0 rgba(0, 0, 0, 0.85),
         3px -3px 0 rgba(0, 0, 0, 0.78),
        -3px -3px 0 rgba(0, 0, 0, 0.95),
         0    4px 0 rgba(0, 0, 0, 0.9),
         0   -4px 0 rgba(0, 0, 0, 0.75),
         4px  0   0 rgba(0, 0, 0, 0.7),
        -4px  0   0 rgba(0, 0, 0, 0.85),
        /* tape-bleed glow */
         0 0 22px rgba(255, 240, 180, 0.35);
      filter: blur(0.8px) contrast(1.05);
      letter-spacing: 0.01em;
      pointer-events: none !important;     /* defeat any iOS quirk */
      touch-action: none;
      opacity: 0;
      /* Slow fade-in (matches VHS_FADE_MS so they sync). The fade-OUT is
         overridden below for non-idle states so the wordmark snaps away
         when playback starts instead of lingering. */
      transition: opacity 1.8s ease;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      z-index: 60;        /* above the VHS layer so it can appear on the last frame */
    }
    /* Keep all UI overlays above the video stack */
    .start-btn, .paths { z-index: 10; }
    .debug { z-index: 9999; }
    body.brand-ready[data-state="idle"] .brand { opacity: 1; }
    /* Fast fade-out when leaving idle (e.g., after pressing START). */
    body[data-state="scrubbing"] .brand,
    body[data-state="ended"]    .brand { transition: opacity 0.35s ease; }

    /* VCR OSD Mono — same font as the "PLAY" text in the VHS preloader */
    @font-face {
      font-family: 'VCR OSD Mono';
      src: url('VCR_OSD_MONO.ttf') format('truetype');
      font-display: swap;
    }

    /* Start button — sits below the wordmark, only visible during idle.
       Styled to match the VHS "PLAY" overlay: cream fill, chromatic
       aberration ghosts, soft edges, uneven black outline. */
    .start-btn {
      position: absolute;
      bottom: 8vh;                                 /* anchored near the bottom */
      left: 50%;
      transform: translateX(-50%);
      font-family: 'VCR OSD Mono', ui-monospace, monospace;
      font-size: 1.6rem;
      letter-spacing: 0.01em;
      text-transform: uppercase;
      /* No baseline animation — the blink is declared on the visibility rule
         below so it only runs while the button is supposed to be on screen.
         Otherwise vhs-blink keeps re-showing the button after press. */
      color: #fff5c4;                              /* warm cream */
      text-shadow:
        /* chromatic aberration — red ghost left, cyan ghost right */
        -1.8px 0 0 rgba(255, 50, 70, 0.55),
         1.8px 0 0 rgba(70, 220, 255, 0.45),
        /* thick uneven black outline — broken on purpose, not a perfect halo */
         2px  2px 0 rgba(0, 0, 0, 0.95),
        -2px  2px 0 rgba(0, 0, 0, 0.85),
         2px -2px 0 rgba(0, 0, 0, 0.78),
        -2px -2px 0 rgba(0, 0, 0, 0.95),
         0    3px 0 rgba(0, 0, 0, 0.9),
         0   -3px 0 rgba(0, 0, 0, 0.75),
         3px  0   0 rgba(0, 0, 0, 0.7),
        -3px  0   0 rgba(0, 0, 0, 0.85),
        /* tape-bleed glow */
         0 0 8px rgba(255, 240, 180, 0.35);
      filter: blur(0.35px) contrast(1.05);          /* soft analog edges */
      background: transparent;
      border: none;
      padding: 0.4rem 1rem;
      cursor: pointer;
      transition: opacity 0.5s ease, color 0.2s ease;
      opacity: 0;
      pointer-events: none;
    }
    .start-btn:hover { color: #ffea00; }
    @keyframes vhs-blink {
      0%   { opacity: 1; }
      50%  { opacity: 0; }
      100% { opacity: 1; }
    }
    /* Press feedback: smooth 1s fade-out, color shifts to yellow as a subtle
       "selected" confirmation. !important so it beats the visibility rule's
       vhs-blink during the brief window where both selectors match. */
    .start-btn.pressed {
      animation: vhs-press 1s ease forwards !important;
      pointer-events: none;
      color: #ffea00;
    }
    @keyframes vhs-press {
      0%   { opacity: 1; }
      100% { opacity: 0; }
    }
    /* Visible when videos are loaded AND (we're in idle OR paused at a checkpoint).
       The blink animation is scoped to this rule so it stops when the button
       isn't supposed to be on screen — otherwise it keeps reviving the button
       after press, since CSS animations override static opacity values. */
    body.videos-ready[data-state="idle"] .start-btn,
    body.paused-at-checkpoint .start-btn {
      opacity: 1;
      pointer-events: auto;
      animation: vhs-blink 2s step-end infinite;
    }
    /* Hidden during the VHS sequence even if conditions above are met. */
    body.vhs-running .start-btn { opacity: 0 !important; pointer-events: none !important; }

    /* Paths fade in once we're in ended state */
    .paths {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.4rem;
      padding: 2rem;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.8s ease;
    }
    body[data-state="ended"] .paths {
      opacity: 1;
      pointer-events: auto;
    }
    .paths a {
      color: #fff;
      text-decoration: none;
      font-size: clamp(2.2rem, 7vw, 5rem);
      line-height: 1;
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.6s ease, transform 0.6s ease, color 0.2s ease;
      mix-blend-mode: difference;
    }
    body[data-state="ended"] .paths a { opacity: 1; transform: translateY(0); }
    body[data-state="ended"] .paths a:nth-child(1) { transition-delay: 0.10s; }
    body[data-state="ended"] .paths a:nth-child(2) { transition-delay: 0.22s; }
    body[data-state="ended"] .paths a:nth-child(3) { transition-delay: 0.34s; }
    body[data-state="ended"] .paths a:nth-child(4) { transition-delay: 0.46s; }
    .paths a:hover { color: #b58cff; }

    /* VHS intro overlay — covers everything until it cycles, holds, and fades. */
    .vhs-intro {
      position: fixed;
      inset: 0;
      z-index: 50;
      /* Black like body/stage — frames cover this fully, so the bg only
         shows during the brief load window. */
      background: #000;
      pointer-events: none;
      opacity: 1;
      transition: opacity 1.8s ease;
    }
    .vhs-intro.fading { opacity: 0; }
    /* All 6 frames are stacked in the same spot. Only .active is visible.
       Pre-stacking lets iOS decode each frame once on initial load — swapping
       which is visible is then pure CSS, no decode hit per swap. */
    .vhs-intro img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: right center;   /* anchor the right side (where the play text lives) */
      display: block;
      visibility: hidden;
    }
    .vhs-intro img.active { visibility: visible; }
    /* (Start button visibility rules live with .start-btn above.) */

    /* Debug overlay — only visible when URL has ?debug=1 */
    .debug {
      position: fixed;
      top: env(safe-area-inset-top, 0.5rem);
      left: 0.5rem;
      right: 0.5rem;
      max-width: 28rem;
      background: rgba(0,0,0,0.78);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 0.4rem;
      padding: 0.6rem 0.8rem;
      font: 12px ui-monospace, monospace;
      line-height: 1.45;
      color: #cde9ff;
      z-index: 9999;
      pointer-events: none;
      backdrop-filter: blur(6px);
    }
    .debug b { color: #ffd270; font-weight: 400; }
    body:not(.debug-on) .debug { display: none; }
  </style>
</head>
<body data-state="idle">

  <div class="stage">
    <!-- Three layered videos: idle (autoplay loop), scrub (driven by input), end (plays once) -->
    <!-- idle plays immediately via the URL src (iOS lets autoplay+muted videos load).
         scrub & end are loaded via fetch->Blob in JS to bypass iOS's quirky multi-video
         loading rules — see the preloadAsBlob() block in the script. -->
    <!-- src is set in JS so desktop (pointer:fine) gets videos_hd/ originals
         and mobile gets the smaller re-encoded files in the project root. -->
    <video id="idle-video"  class="layer" muted loop autoplay playsinline preload="auto"></video>
    <video id="scrub-video" class="layer" muted          playsinline></video>
    <video id="end-video"   class="layer" muted loop     playsinline></video>

    <div class="brand">quentin.</div>
    <button class="start-btn" id="start-btn" type="button">start</button>

    <nav class="paths">
      <a href="#">pray i die.</a>
      <a href="#">ai media co.</a>
      <a href="#">instagram.</a>
      <a href="#">contact.</a>
    </nav>

    <!-- VHS intro: cycles through static frames, lands on last, holds, fades out.
         All 4 frames sit pre-decoded in the DOM; JS just toggles which has the
         .active class. iOS Safari decodes each <img> once on load; swaps after
         that are pure CSS, no decode lag per frame.
         <picture> serves the high-res PNG to desktop (pointer:fine), and the
         compressed mobile JPG to phones — no JS needed for the swap. -->
    <div class="vhs-intro" id="vhs-intro">
      <picture>
        <source srcset="vhs_frames_hd/frame_01.png" media="(pointer: fine)">
        <img class="vhs-frame active" data-i="0" alt="" src="vhs_frames/frame_01.jpg" fetchpriority="high">
      </picture>
      <picture>
        <source srcset="vhs_frames_hd/frame_02.png" media="(pointer: fine)">
        <img class="vhs-frame" data-i="1" alt="" src="vhs_frames/frame_02.jpg">
      </picture>
      <picture>
        <source srcset="vhs_frames_hd/frame_03.png" media="(pointer: fine)">
        <img class="vhs-frame" data-i="2" alt="" src="vhs_frames/frame_03.jpg">
      </picture>
      <picture>
        <source srcset="vhs_frames_hd/frame_04.png" media="(pointer: fine)">
        <img class="vhs-frame" data-i="3" alt="" src="vhs_frames/frame_04.jpg">
      </picture>
    </div>

    <div class="debug" id="debug"></div>
  </div>

  <script>
    const idleVid  = document.getElementById('idle-video');
    const scrubVid = document.getElementById('scrub-video');
    const endVid   = document.getElementById('end-video');

    // Desktop (mouse pointer) gets the high-res 1080p originals from videos_hd/.
    // Mobile / touch devices get the smaller 720p files from the project root.
    const isDesktop = matchMedia('(pointer: fine)').matches;
    const VIDEO_DIR = isDesktop ? 'videos_hd/' : '';

    // Set idle video src now that we know which directory to use. Autoplay
    // attribute on the element kicks in once the src is set + load() runs.
    idleVid.src = VIDEO_DIR + 'static%20intro.mp4';
    try { idleVid.load(); } catch (_) {}

    // Fetch each non-autoplay video to a Blob and hand iOS an in-memory URL —
    // sidesteps iOS Safari's quirky lazy-load behavior for non-autoplay videos.
    function preloadAsBlob(videoEl, url) {
      fetch(url, { cache: 'force-cache' })
        .then(r => { if (!r.ok) throw new Error('http ' + r.status); return r.blob(); })
        .then(blob => {
          videoEl.src = URL.createObjectURL(blob);
          // load() forces the element to pick up the new src
          try { videoEl.load(); } catch (_) {}
        })
        .catch(() => {
          // Fallback: hand iOS the URL directly
          videoEl.src = url;
          try { videoEl.load(); } catch (_) {}
        });
    }
    // NOTE: scrub + end video preloads are NOT kicked off here. They're heavy
    // (4 MB + 600 KB) and parallel fetches on mobile starve the tiny VHS frame
    // images of connection slots. We trigger preloadAsBlob below, only after
    // all VHS frames have finished loading. By the time the user scrolls (a
    // few seconds later) the scrub video is ready.
    let scrubPreloaded = false;
    function preloadVideosOnce() {
      if (scrubPreloaded) return;
      scrubPreloaded = true;
      preloadAsBlob(scrubVid, VIDEO_DIR + 'brain%20zoom%201.mp4');
      preloadAsBlob(endVid,   VIDEO_DIR + 'outro.mp4');
    }

    // ---- State machine: idle -> scrubbing -> ended ----
    let state = 'idle';
    function setState(next) {
      if (state === next) return;
      state = next;
      document.body.dataset.state = next;
      // Lower layers stay active as backdrops so the new layer fades in over
      // a fully-opaque previous frame (no black flash through transparency).
      setActive(idleVid,  true);
      setActive(scrubVid, next === 'scrubbing' || next === 'ended');
      setActive(endVid,   next === 'ended');

      if (next === 'idle') {
        idleVid.play().catch(() => {});
        scrubVid.pause();
        endVid.pause(); endVid.currentTime = 0;
      } else if (next === 'scrubbing') {
        idleVid.pause();
        endVid.pause(); endVid.currentTime = 0;
      } else if (next === 'ended') {
        scrubVid.pause();
        endVid.currentTime = 0;
        endVid.play().catch(() => {});
      }
    }
    function setActive(el, on) {
      el.classList.toggle('active', on);
    }
    setActive(idleVid, true); // initial paint

    // iOS Safari frequently ignores the `autoplay` HTML attribute. Force the
    // idle video to play once it has data, and on visibility return.
    function playIdle() {
      idleVid.muted = true;
      const p = idleVid.play();
      if (p && typeof p.catch === 'function') p.catch(() => {});
    }
    if (idleVid.readyState >= 2) playIdle();
    else idleVid.addEventListener('loadeddata', playIdle);
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden && state === 'idle') playIdle();
    });

    // iOS Safari blocks playback until a video has been play()'d inside a user
    // gesture. The Start click unlocks scrubVid by itself (we play() it directly).
    // We still need to prime endVid here so its later auto-play in setState('ended')
    // succeeds — the Start click is also our gesture window for that.
    let primed = false;
    function primeOnFirstGesture() {
      if (primed) return;
      primed = true;
      const p = endVid.play();
      if (p && typeof p.then === 'function') {
        p.then(() => endVid.pause()).catch(() => {});
      } else {
        try { endVid.pause(); } catch (_) {}
      }
    }

    // Gate the preloader's fade-out until the page can transition seamlessly:
    //   - idle video has enough data to play (rs>=3 = HAVE_FUTURE_DATA)
    //   - scrub video has metadata so the first scroll can seek
    //   - custom wordmark font is loaded so "quentin." doesn't flash a fallback
    // The toggle phase keeps cycling 04↔03 until all three are true (or the
    // 6-second hard cap fires).
    let videosReady = false;
    function markReady(reason) {
      if (videosReady) return;
      videosReady = true;
      document.body.classList.add('videos-ready');
    }
    function checkReady() {
      if (videosReady) return;
      const idleOk  = idleVid.readyState  >= 3;
      const scrubOk = scrubVid.readyState >= 1;
      let fontOk = true;
      try { fontOk = document.fonts.check('1em LowerResolution'); } catch (_) {}
      if (idleOk && scrubOk && fontOk) markReady('all-ready');
    }
    idleVid.addEventListener('canplay',         checkReady);
    idleVid.addEventListener('canplaythrough',  checkReady);
    scrubVid.addEventListener('loadedmetadata', checkReady);
    scrubVid.addEventListener('loadeddata',     checkReady);
    scrubVid.addEventListener('canplay',        checkReady);
    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(checkReady);
    }
    setTimeout(() => markReady('timeout'), 6000);  // hard cap — never get stuck
    checkReady();


    // ---- Button-driven playback (with future checkpoint support) ----
    // Add timestamps (in seconds) when overlays exist for those moments.
    // Empty = play through start to end without stopping.
    const CHECKPOINTS = [];
    let nextCheckpointIdx = 0;
    let watchRaf = 0;

    const startBtn = document.getElementById('start-btn');
    function startPlayback() {
      if (!videosReady) return;
      // Trigger the press-flash animation. Force reflow so re-presses (Continue
      // after a checkpoint) restart the animation cleanly.
      startBtn.classList.remove('pressed');
      void startBtn.offsetWidth;
      startBtn.classList.add('pressed');
      primeOnFirstGesture();
      setState('scrubbing');
      document.body.classList.remove('paused-at-checkpoint');
      const p = scrubVid.play();
      if (p && p.catch) p.catch(() => {});
      watchPlayback();
    }
    startBtn.addEventListener('click', startPlayback);
    // After the press animation finishes, drop the class so the next press
    // (Continue) can re-trigger it. Button is invisible by then anyway.
    startBtn.addEventListener('animationend', (e) => {
      if (e.animationName === 'vhs-press') startBtn.classList.remove('pressed');
    });

    function watchPlayback() {
      cancelAnimationFrame(watchRaf);
      const stopAt = CHECKPOINTS[nextCheckpointIdx];   // undefined = play to end
      const tick = () => {
        if (scrubVid.paused || scrubVid.ended) return;
        if (stopAt !== undefined && scrubVid.currentTime >= stopAt) {
          scrubVid.pause();
          nextCheckpointIdx++;
          document.body.classList.add('paused-at-checkpoint');
          return;
        }
        watchRaf = requestAnimationFrame(tick);
      };
      watchRaf = requestAnimationFrame(tick);
    }

    scrubVid.addEventListener('ended', () => {
      cancelAnimationFrame(watchRaf);
      document.body.classList.remove('paused-at-checkpoint');
      setState('ended');
    });

    // Paint first frame of scrub video so it's primed
    function primeScrub() { scrubVid.currentTime = 0; }
    if (scrubVid.readyState >= 2) primeScrub();
    else scrubVid.addEventListener('loadeddata', primeScrub);

    // ------- VHS intro sequence -------
    // 4 frames in DOM: 0=frame_01, 1=frame_02, 2=frame_03, 3=frame_04.
    // Initial cycle: 0→2 (frame_01 → frame_02 → frame_03, lands on _03).
    // Toggle phase:  3↔2 (frame_04 ↔ frame_03) until the videos are ready.
    const VHS_INITIAL_LAST = 2;   // last index of initial cycle (frame_03)
    const VHS_TOGGLE_A     = 3;   // frame_04
    const VHS_TOGGLE_B     = 2;   // frame_03

    const VHS_FLICKER_MS         = 130;    // ms per frame in the initial cycle
    const VHS_BRAND_HOLD_MS      = 1100;   // hold on frame_03 so wordmark can fade in
    const VHS_TOGGLE_MS          = 1000;   // ms per swap during the 4↔3 loop
    const VHS_MIN_CYCLES         = 2;      // minimum 4↔3 round-trips before allowing fade
    const VHS_FADE_MS            = 1800;   // matches CSS opacity transition

    document.body.classList.add('vhs-running');
    const vhsLayer  = document.getElementById('vhs-intro');
    const vhsFrames = Array.from(vhsLayer.querySelectorAll('.vhs-frame'));

    // Show one frame by index; toggle .active. No src-swapping = no decode hit.
    let vhsActive = 0;
    function showFrame(i) {
      if (i === vhsActive) return;
      vhsFrames[vhsActive].classList.remove('active');
      vhsFrames[i].classList.add('active');
      vhsActive = i;
    }

    // Wait for ALL VHS frames before starting the sequence. They're tiny (~80KB
     // each) so this is fast, and waiting prevents the sequence from running on
     // a black screen if any frame hasn't decoded yet on mobile.
    function waitForImg(im) {
      return im.complete && im.naturalWidth > 0
        ? Promise.resolve()
        : new Promise(resolve => {
            im.addEventListener('load',  resolve, { once: true });
            im.addEventListener('error', resolve, { once: true });
          });
    }
    const allFramesPromise = Promise.all(vhsFrames.map(waitForImg));
    // Once all frames are in, kick off the heavy video preloads. Network is
    // free at this point, so the videos get full bandwidth.
    allFramesPromise.then(preloadVideosOnce);
    // 3s safety net in case something stalls — start preloading regardless.
    setTimeout(preloadVideosOnce, 3000);
    // Sequence-start gate. Same promise drives both — sequence cannot run on
    // a black screen because every frame is decoded before runVHS fires.
    const firstFramePromise = allFramesPromise;

    function fadeOutVHS() {
      vhsLayer.classList.add('fading');
      // Brand fades in synchronized with the VHS layer fading out. Both
      // transitions run at 1.8s so they finish at the same moment.
      document.body.classList.add('brand-ready');
      // Kick the idle video before the fade starts so it's already moving by the
      // time the VHS layer goes transparent. Try again on completion as a backup.
      try { playIdle(); } catch (_) {}
      // iOS Safari often skips loading a video that's been covered by another
      // element. Force-trigger the scrub video's download now that VHS is going.
      try { if (scrubVid.readyState < 2) scrubVid.load(); } catch (_) {}
      setTimeout(() => {
        vhsLayer.style.display = 'none';
        document.body.classList.remove('vhs-running');
        try { playIdle(); } catch (_) {}
      }, VHS_FADE_MS);
    }

    function startToggle() {
      // Always show at least 2 full back-and-forths (04 → 03 → 04 → 03 → 04)
      // before allowing the fade, regardless of how fast the videos load.
      // Stops only when we've landed back on frame_04 AND videos are ready.
      let onA = true;        // start on frame_04
      let cycles = 0;        // full round-trips back to frame_04
      showFrame(VHS_TOGGLE_A);

      const toggle = setInterval(() => {
        onA = !onA;
        showFrame(onA ? VHS_TOGGLE_A : VHS_TOGGLE_B);

        if (onA) {
          cycles++;
          if (cycles >= VHS_MIN_CYCLES && videosReady) {
            clearInterval(toggle);
            setTimeout(fadeOutVHS, 350);   // brief hold so frame_04 reads as final
          }
        }
      }, VHS_TOGGLE_MS);
    }

    function runVHS() {
      // Frame_01 is already .active from HTML — no need to re-set anything.
      let i = 0;
      const flicker = setInterval(() => {
        i++;
        if (i <= VHS_INITIAL_LAST) {
          showFrame(i);
        } else {
          clearInterval(flicker);
          // Brief dwell on frame_03 before the 4↔3 toggle begins.
          setTimeout(startToggle, VHS_BRAND_HOLD_MS);
        }
      }, VHS_FLICKER_MS);
    }

    // Wait specifically for frame_01 to be cached, then go. Hard 2s fallback so
    // a slow network can't keep the page on a black screen forever.
    let started = false;
    function startOnce() { if (!started) { started = true; runVHS(); } }
    firstFramePromise.then(startOnce);
    setTimeout(startOnce, 2000);

    // ------- Debug overlay (?debug=1) -------
    if (new URLSearchParams(location.search).has('debug')) {
      document.body.classList.add('debug-on');
      const dbg = document.getElementById('debug');
      let lastErr = '—';

      ['error','stalled','abort'].forEach(ev => {
        [idleVid, scrubVid, endVid].forEach(v => v.addEventListener(ev, e => {
          lastErr = `${v.id}.${ev} (code=${v.error && v.error.code})`;
        }));
      });

      const fmt = v => `rs=${v.readyState} dur=${isFinite(v.duration)?v.duration.toFixed(2):'?'} t=${v.currentTime.toFixed(2)} paused=${v.paused}`;

      const vhsStatus = () => {
        const loaded = vhsFrames.filter(im => im.complete && im.naturalWidth > 0).length;
        return `frame_${String(vhsActive + 1).padStart(2,'0')} loaded=${loaded}/${vhsFrames.length}`;
      };

      function paint() {
        const paused = document.body.classList.contains('paused-at-checkpoint');
        dbg.innerHTML =
          `<b>state</b> ${state} | <b>primed</b> ${primed} | <b>paused-cp</b> ${paused}<br>` +
          `<b>checkpoints</b> [${CHECKPOINTS.join(', ')}] | <b>next</b> ${nextCheckpointIdx}<br>` +
          `<b>idle </b> ${fmt(idleVid)}<br>` +
          `<b>scrub</b> ${fmt(scrubVid)}<br>` +
          `<b>end  </b> ${fmt(endVid)}<br>` +
          `<b>vhs  </b> ${vhsStatus()}<br>` +
          `<b>err</b> ${lastErr} | <b>vh</b> ${window.innerHeight}`;
        requestAnimationFrame(paint);
      }
      paint();
    }
  </script>

</body>
</html>

          font-size="180"><tspan class="ltr">q</tspan><tspan class="ltr">u</tspan><tspan class="ltr">e</tspan><tspan class="ltr">n</tspan><tspan class="ltr">t</tspan><tspan class="ltr">i</tspan><tspan class="ltr">n</tspan><tspan class="ltr">.</tspan></text>

    <text class="glint-shimmer"
          x="0"    y="55%" text-anchor="start"  dominant-baseline="middle"
          font-family="LowerResolution, system-ui, sans-serif"
          font-size="180" fill="url(#glintA)"><tspan class="ltr">q</tspan><tspan class="ltr">u</tspan><tspan class="ltr">e</tspan><tspan class="ltr">n</tspan><tspan class="ltr">t</tspan><tspan class="ltr">i</tspan><tspan class="ltr">n</tspan><tspan class="ltr">.</tspan></text>

    <text class="glint-shimmer"
          x="0"    y="55%" text-anchor="start"  dominant-baseline="middle"
          font-family="LowerResolution, system-ui, sans-serif"
          font-size="180" fill="url(#glintB)"><tspan class="ltr">q</tspan><tspan class="ltr">u</tspan><tspan class="ltr">e</tspan><tspan class="ltr">n</tspan><tspan class="ltr">t</tspan><tspan class="ltr">i</tspan><tspan class="ltr">n</tspan><tspan class="ltr">.</tspan></text>
  </svg>

  <script>
    const patA = document.getElementById('glintA');
    const patB = document.getElementById('glintB');
    const ltrTspans = document.querySelectorAll('.ltr');
    const LAYERS = 3, LTR_COUNT = 8, BASE = 180, AMP = 18;
    const WAVE_SPEED = 2.5, LETTER_GAP = 0.65;

    let start = null;
    function tick(now) {
      if (!start) start = now;
      const t = (now - start) / 1000;

      const offA = (t * 64) % 160;
      const offB = -((t * 47) % 190);
      patA.setAttribute('patternTransform', `rotate(18) scale(1.2) translate(${offA} 0)`);
      patB.setAttribute('patternTransform', `rotate(-18) scale(1.4) translate(${offB} 0)`);

      const wavePos = t * WAVE_SPEED;
      for (let i = 0; i < LTR_COUNT; i++) {
        const size = BASE + AMP * Math.sin(wavePos - i * LETTER_GAP);
        for (let layer = 0; layer < LAYERS; layer++) {
          ltrTspans[layer * LTR_COUNT + i].setAttribute('font-size', size);
        }
      }
      // re-center: measure rendered width and lock to mid-x of viewBox
      const textEls = document.querySelectorAll('text');
      const totalWidth = textEls[0].getComputedTextLength();
      const startX = (800 - totalWidth) / 2;
      textEls.forEach(t => t.setAttribute('x', startX));



      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  </script>

</body>
